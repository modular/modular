//
// Wire schema for the Cascade gRPC `Runtime` transport.
//
// Args, kwargs, and return values use the structured ``ValueSlot`` envelope
// so they round-trip cleanly between language implementations. Only
// ``DeployWorker`` carries an opaque pickled blob; that path is intentionally
// Python-only and is bypassed by non-Python clients (which deploy workers
// out-of-band).
syntax = "proto3";

package max.experimental.cascade.grpc_runtime.v1;

message Empty {}

message AliveResponse {
  bool alive = 1;
}

message MetricsResponse {
  string prometheus = 1;
}

// ---------------------------------------------------------------------------
// Value envelope for args, kwargs, and return values.
// ---------------------------------------------------------------------------

// Inline ndarray payload. ``shape`` follows numpy semantics; ``dtype_str``
// uses numpy's byteorder-prefixed code (e.g. ``"<f4"``, ``"|u1"``).
message NDArray {
  string dtype = 1;
  repeated int64 shape = 2;
  bytes data = 3;
}

// Reference to another result on a grpc runtime. Used to chain calls
// without round-tripping the value through the client.
message ResultReference {
  string target = 1;
  string result_id = 2;
}

// Reference to another result on a grpc runtime. Used to chain calls
// without round-tripping the value through the client.
message ResultStreamReference {
  string target = 1;
  string result_id = 2;
}

// One top-level argument, kwarg, or return value.
//
// Composite/structured values (lists, dicts, pydantic models, primitives)
// travel as JSON-encoded UTF-8 in ``json_string``. Binary leaves get their
// own slots so they don't have to be base64-wrapped through JSON.
message ValueSlot {
  oneof kind {
    bytes bytes_value = 1;
    string json_string = 2;
    NDArray ndarray = 3;
    ResultReference result_ref = 4;
    ResultStreamReference stream_ref = 5;
  }
}

// Structured error envelope. ``message`` and ``type_name`` are always
// populated and are the interoperable surface for non-Python clients;
message ErrorEnvelope {
  string message = 1;
  string type_name = 2;
}

// ---------------------------------------------------------------------------
// Wire primitives.
// ---------------------------------------------------------------------------

message DeployWorkerRequest {
  enum WorkerFormat {
    WORKER_FORMAT_UNSPECIFIED = 0;
    WORKER_FORMAT_PICKLE = 1;
  }
  WorkerFormat format = 1;
  bytes worker_blob = 2;
}

message DeployWorkerResponse {
  string worker_id = 1;
}

message CallMethodRequest {
  string worker_id = 1;
  string method = 2;
  repeated ValueSlot args = 3;
  map<string, ValueSlot> kwargs = 4;
}

message CallMethodResponse {
  // Generated by the server.
  string result_id = 1;
}

message GetResultRequest {
  string result_id = 1;
}

message GetResultResponse {
  oneof outcome {
    ValueSlot value = 1;
    ErrorEnvelope error = 2;
  }
}

// Inline server-streaming consumption for lightweight streams (e.g. token
// streams). HTTP/2 flow control bounds in-flight production as long as the
// server's send loop allocates just-in-time and does not prefetch ahead.
message StreamResultRequest {
  string result_id = 1;
}

message StreamResultResponse {
  oneof outcome {
    ValueSlot value = 1;
    ErrorEnvelope error = 2;
  }
}

service CascadeRuntimeService {
  rpc GetAlive(Empty) returns (AliveResponse) {}
  rpc GetMetrics(Empty) returns (MetricsResponse) {}
  rpc DeployWorker(DeployWorkerRequest) returns (DeployWorkerResponse) {}
  rpc CallMethod(CallMethodRequest) returns (stream CallMethodResponse) {}
  rpc GetResult(GetResultRequest) returns (GetResultResponse) {}
  rpc StreamResult(StreamResultRequest) returns (stream StreamResultResponse) {}
}
